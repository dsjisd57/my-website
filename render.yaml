services:
  - type: web
    name: my-website
    env: node
    region: singapore
    plan: free
    buildCommand: |-
      export VITE_BASE_URL=/
      npm ci
      npm run build
      cd server
      npm ci
      npm run build
    startCommand: node server/dist/index.js
    envVars:
      - key: STATIC_PATH
        value: /
      - key: NODE_ENV
        value: production
    healthCheckPath: /api/health
